# When this file is used alone (cd backend && docker compose up), use project name lai.
# When included from repo-root docker-compose.yml, name matches the root file.
name: lai

services:
  backend:
    image: ${LAI_BACKEND_IMAGE:-lai-backend:local}
    build:
      context: .
      args:
        # MMYOLO conda env is copied from this image (build celery_worker first).
        CELERY_IMAGE: ${LAI_CELERY_IMAGE:-lai-celery:local}
    volumes:
      # Host backend code: optional bind via backend/docker-compose.code-mount.yml + COMPOSE_FILE (see install.sh).
      # Host data root: set LAI_DATA_DIR via scripts/install.sh (default ../.lai-data relative to this file = repo .lai-data)
      - ${LAI_DATA_DIR:-../.lai-data}/projects:/app/projects
      - ${LAI_DATA_DIR:-../.lai-data}/data:/app/data
      - ${BACKUP_PATH:-${LAI_DATA_DIR:-../.lai-data}/backups}:/app/backups
      - ${LAI_DATA_DIR:-../.lai-data}/runs:/app/runs
      - ${LAI_DATA_DIR:-../.lai-data}/cache/backend:/app/.cache
      # Foundation model weights — populated by `make download-models` (slim image keeps it empty).
      - ${LAI_DATA_DIR:-../.lai-data}/models:/app/models
      - ${LAI_DATA_DIR:-../.lai-data}/ai_models:/app/ai_models
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/lai_db
      - ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:${WEB_PORT:-8089},http://127.0.0.1:${WEB_PORT:-8089}
      - SERVICE_TYPE=main
      - TRAINING_SERVICE_URL=http://training:8000
      - REDIS_URL=redis://redis:6379/0
      - USE_CELERY=true
      - XDG_CACHE_HOME=/app/.cache
      - MIM_CACHE_DIR=/app/.cache/mim
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017
      - FIFTYONE_DEFAULT_APP_PORT=5151
      - FIFTYONE_DEFAULT_APP_ADDRESS=0.0.0.0
    ports:
      - "9999:8000"
      - "5151:5151"  # FiftyOne UI
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"

  # Celery Worker for Training Tasks with GPU support
  celery_worker:
    image: ${LAI_CELERY_IMAGE:-lai-celery:local}
    build:
      context: .
      dockerfile: Dockerfile.training
    # Always set CUDA_VISIBLE_DEVICES=0 so PyTorch sees the first GPU (GTX 1070 etc). Empty/unset would hide the GPU.
    command: sh -c "export CUDA_VISIBLE_DEVICES=0; exec python -m celery -A app.celery_app worker --loglevel=info --concurrency=1 --pool=solo"
    volumes:
      # Optional /app bind: backend/docker-compose.code-mount.yml (see install.sh COMPOSE_FILE).
      - ${LAI_DATA_DIR:-../.lai-data}/projects:/app/projects
      - ${LAI_DATA_DIR:-../.lai-data}/data:/app/data
      - ${LAI_DATA_DIR:-../.lai-data}/backups:/app/backups
      - ${LAI_DATA_DIR:-../.lai-data}/runs:/app/runs
      - ${LAI_DATA_DIR:-../.lai-data}/cache/celery_worker:/app/.cache
      # Shared model weights with the backend service.
      - ${LAI_DATA_DIR:-../.lai-data}/models:/app/models
      - ${LAI_DATA_DIR:-../.lai-data}/ai_models:/app/ai_models
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/lai_db
      - REDIS_URL=redis://redis:6379/0
      - XDG_CACHE_HOME=/app/.cache
      - MIM_CACHE_DIR=/app/.cache/mim
      # Expose GPU to the container; use first GPU. Do not set CUDA_VISIBLE_DEVICES to empty or PyTorch will see no GPU.
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      # Model evaluation throughput tuning (all optional; sensible auto-defaults).
      # See backend/app/tasks/evaluation_tasks.py for full semantics.
      - LAI_EVAL_HALF=${LAI_EVAL_HALF:-1}                       # FP16 inference (1=on, 0=off)
      - LAI_EVAL_IMGSZ=${LAI_EVAL_IMGSZ:-640}                   # Inference image size
      - LAI_EVAL_BATCH=${LAI_EVAL_BATCH:-}                      # Force batch size (empty = auto)
      - LAI_EVAL_BATCH_MAX=${LAI_EVAL_BATCH_MAX:-512}           # Cap on auto/ramp-up batch size
      - LAI_EVAL_DEVICE=${LAI_EVAL_DEVICE:-}                    # "0", "cpu", "cuda:0"; empty = auto
      - LAI_EVAL_DECODE_WORKERS=${LAI_EVAL_DECODE_WORKERS:-8}   # Parallel JPEG/PNG decoder threads
      - LAI_EVAL_PREFETCH_CHUNKS=${LAI_EVAL_PREFETCH_CHUNKS:-2} # Decoded chunks queued ahead of GPU
      # Stale-task watchdog (auto-cancel pending/running tasks idle this many hours).
      - LAI_STALE_TASK_TIMEOUT_HOURS=${LAI_STALE_TASK_TIMEOUT_HOURS:-12}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    shm_size: '8gb'
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*worker' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia
    restart: unless-stopped

  # Celery Flower - Web UI for monitoring tasks
  flower:
    image: ${LAI_CELERY_IMAGE:-lai-celery:local}
    command: python -m celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*flower' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Redis for Celery broker and result backend
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ${LAI_DATA_DIR:-../.lai-data}/redis:/data
    command: redis-server --appendonly yes --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MongoDB for FiftyOne
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ${LAI_DATA_DIR:-../.lai-data}/mongodb:/data/db
    restart: unless-stopped

  # SAM 2/3 service: needs the same GPU exposure as `backend` (runtime + NVIDIA_* env).
  # Requires: NVIDIA Container Toolkit (`nvidia-smi` in container). Do not set SAM_FORCE_CPU when using GPU.
  sam_service:
    image: ${LAI_SAM_IMAGE:-lai-sam:local}
    build:
      context: ./sam_service
    runtime: nvidia
    environment:
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN:-}
      - SAM3_CHECKPOINT_PATH=/models/sam3/${SAM3_CHECKPOINT_FILENAME:-sam3.pt}
      - SAM3_ALLOW_HF_DOWNLOAD=${SAM3_ALLOW_HF_DOWNLOAD:-false}
      # true = force CPU only (skip if you want GPU)
      - SAM_FORCE_CPU=${SAM_FORCE_CPU:-false}
      - WERKZEUG_RUN_MAIN=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Match celery_worker: explicit index avoids PyTorch seeing no device / CUDA init quirks
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ${SAM3_MODELS_HOST_PATH:-./sam_service/models}:/models/sam3:ro
    ports:
      - "8081:8081"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  db:
    image: postgres:15
    volumes:
      - ${LAI_DATA_DIR:-../.lai-data}/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lai_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# Data lives under LAI_DATA_DIR (default: ../.lai-data from this file). Run scripts/install.sh to pick a folder.