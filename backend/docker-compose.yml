services:
  backend:
    build: .
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/lai_db
      - ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      - SERVICE_TYPE=main
      - TRAINING_SERVICE_URL=http://training:8000
      - REDIS_URL=redis://redis:6379/0
      - USE_CELERY=true
    ports:
      - "9999:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "1.0"

  # Celery Worker for Training Tasks with GPU support
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.training
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1 --pool=solo
    volumes:
      - .:/app
      - ./projects:/app/projects
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db/lai_db
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    shm_size: '8gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia
    restart: unless-stopped

  # Celery Flower - Web UI for monitoring tasks
  flower:
    build:
      context: .
      dockerfile: Dockerfile.training
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker
    restart: unless-stopped

  # Redis for Celery broker and result backend
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  sam_service:
    build:
      context: ./sam_service
    environment:
      - SAM_WEIGHTS=/models/sam_v2.pth
      - PYTHONUNBUFFERED=1
    ports:
      - "8081:8081"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lai_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: