services:
  test-backend:
    build: ./backend
    container_name: lai-test-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@test-db/lai_test_db
      - ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      - SERVICE_TYPE=main
      - REDIS_URL=redis://test-redis:6379/0
      - USE_CELERY=false
      - FIFTYONE_DATABASE_URI=mongodb://test-mongodb:27017
    ports:
      - "9999:8000"
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    networks:
      - lai-test-network

  test-db:
    image: postgres:15
    container_name: lai-test-db
    environment:
      POSTGRES_DB: lai_test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # Use different port to avoid conflict with dev database
    volumes:
      - test_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lai-test-network

  test-redis:
    image: redis:7-alpine
    container_name: lai-test-redis
    ports:
      - "6380:6379"  # Use different port
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lai-test-network

  test-mongodb:
    image: mongo:7
    container_name: lai-test-mongodb
    ports:
      - "27018:27017"  # Use different port
    environment:
      MONGO_INITDB_DATABASE: lai_test
    networks:
      - lai-test-network

volumes:
  test_db_data:
    driver: local

networks:
  lai-test-network:
    driver: bridge
